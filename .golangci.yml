version: "2"

linters:
  default: none
  enable:
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - staticcheck    # static analysis (supersedes gosimple, stylecheck, etc.)
    - unused         # unused code
    - gocyclo        # cyclomatic complexity (SonarQube: cyclomatic_complexity)
    - gocognit       # cognitive complexity > 15 (SonarQube: cognitive_complexity)
    - goconst        # duplicate string literals (SonarQube: S1192)
    - gocritic       # style checks incl. grouped params (SonarQube: S1172)
    - revive         # naming conventions + empty blocks (SonarQube: S1609, S108)
    - gosec          # security issues (OWASP-aligned)
    - misspell       # common spelling mistakes
    - godot          # comment punctuation
    - dupl           # duplicated code blocks (SonarQube: S4144)
    - noctx          # http.Request without context
    - bodyclose      # http response body not closed
  settings:
    dupl:
      threshold: 100
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 15
    goconst:
      min-len: 5
      min-occurrences: 2
    gocritic:
      enabled-checks:
        - paramTypeCombine
    revive:
      rules:
        - name: var-naming
        - name: empty-block
        - name: unused-parameter
    godot:
      scope: declarations
    misspell:
      locale: US
  exclusions:
    rules:
      # Test files: relax rules that produce noise in test helpers without catching bugs.
      # goconst and gocritic (paramTypeCombine) remain active for tests — they enforce
      # the same naming/style rules as production code and do not produce false positives.
      # NOTE: SonarQube S4144 (identical method bodies on the same type) is not covered
      # by dupl — it requires SonarQube analysis. Fix those manually when reported.
      - path: "_test\\.go"
        linters:
          - dupl       # tests share structural patterns (setup/teardown) by design
          - gosec      # test code does not run in production
          - gocyclo    # complex table-driven tests are acceptable
          - gocognit   # same as gocyclo
          - errcheck   # deferred close errors in tests can be ignored
          - noctx      # test http calls rarely need context
          - unused     # test helpers may be used indirectly by other test files
          - revive     # interface stubs in fakes must keep parameter names to satisfy the interface
      # Doc-comment style is enforced by CLAUDE.md, not by linter
      - linters: [revive]
        text: "should have comment or be unexported"
      - linters: [revive]
        text: "package-comments"
      - linters: [revive]
        text: "stutters"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
